<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lineage 2 | Bald Arrow</title>
	<link rel="icon" href="favicon.ico">
    <style>
        /* Base Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            height: 100%;
            overflow: hidden; /* Keeps it a clean single-page landing */
        }

        /* Background Image Setup */
        .bg-image {
            background: 
                linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.7)),
                url('4.png'); /* Placeholder for a realistic L2 render */
            background-size: cover;
            background-position: center;
            height: 130vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* Minimal Header */
        h1 {
            color: #f0e6d2;
            font-size: 3rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 40px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
            font-weight: 300;
        }

        /* Button Container */
        .nav-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 300px;
        }

        /* Smooth Minimal Buttons */
        .btn {
            padding: 15px 25px;
            font-size: 1rem;
            color: #ffffff;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: rgba(255, 255, 255, 0.05); /* Very transparent */
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px); /* Frosted glass effect */
            transition: all 0.4s ease;
            border-radius: 4px;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(212, 175, 55, 0.6); /* Subtle Gold highlight */
            color: #d4af37;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* Discord specific highlight */
        .btn-discord:hover {
            border-color: #5865F2;
            color: #5865F2;
        }

        /* Footer/Subtext */
        .footer-text {
            position: absolute;
            bottom: 30px;
            color: rgba(255,255,255,0.4);
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="bg-image">


        <div class="nav-container">
            <a href="#" class="btn">Server Features</a>
            <a href="#" class="btn">Server Files</a>
            <a href="#" class="btn btn-discord">Discord</a>
            <a href="#" class="btn">L2 Hub</a>
        </div>

        <p class="footer-text">EST. 2026 • CHRONICLE C4: SCIONS OF DESTINY</p>
    </div>

</body>
</html>
